project_name: premium-sms
containers:
  build-env:
    image: openjdk:8u141-jdk
    volumes:
      - local: .
        container: /code
        options: cached
      - local: .gradle-cache
        container: /home/container-user/.gradle
        options: cached
      - local: ~/.m2
        container: /home/container-user/.m2
        options: cached
    working_directory: /code
    environment:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Xmx512m
    run_as_current_user:
      enabled: true
      home_directory: /home/container-user

tasks:
  build:
    description: Build the application.
    run:
      container: build-env
      command: ./gradlew shadowJar

  unitTest:
    description: Run the unit tests.
    run:
      container: build-env
      command: ./gradlew test

  shell:
    description: Start a shell in the development environment.
    run:
      container: build-env
      command: bash
